<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumpcey Games | Play Now</title>
    <style>
        :root {
            --primary: #8a2be2; /* Electric Purple */
            --bg: #0f0f12;
            --card-bg: #1a1a1f;
            --text: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            text-align: center;
        }
        header {
            padding: 50px 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            border-bottom: 3px solid var(--primary);
        }
        h1 { font-size: 3.5rem; margin: 0; text-transform: uppercase; letter-spacing: 5px; color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .game-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #333;
        }
        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 20px var(--primary);
            border-color: var(--primary);
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>Mumpcey Games</h1>
    <p>The home of legendary web gaming.</p>
</header>

<div class="container">
    <div class="game-card">
        <h3>Neon Runner</h3>
        <p>Speed through the grid in this high-octane racer.</p>
        <a href="#" class="btn">Play Game</a>
    </div>
    <div class="game-card">
        <h3>Shadow Strike</h3>
        <p>Tactical combat in a world of mystery.</p>
        <a href="#" class="btn">Play Game</a>
    </div>
    <div class="game-card">
        <h3>Void Quest</h3>
        <p>Explore the furthest reaches of the digital cosmos.</p>
        <a href="#" class="btn">Play Game</a>
    </div>
</div>

</body>
</html>
